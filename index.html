<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>three-vrm with VRMA/BVH animations</title>
		<meta
			name="viewport"
			name="viewport"
			content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<style>
			body {
				margin: 0;
				font-family: 'Inter', sans-serif;
				overflow: hidden;
				background-color: #222222;
			}
			canvas {
				display: block;
				width: 100vw;
				height: 100vh;
			}
			.controls {
				position: absolute;
				top: 10px;
				left: 10px;
				background: rgba(0, 0, 0, 0.85);
				color: white;
				padding: 20px;
				border-radius: 12px;
				z-index: 100;
				display: flex;
				flex-direction: column;
				gap: 12px;
				box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
				width: 320px;
			}
			.controls div {
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				gap: 10px;
			}
			.controls label {
				min-width: 90px;
				font-weight: bold;
				color: #e0e0e0;
				font-size: 13px;
			}
			.controls button {
				flex: 1;
				min-width: 70px;
				padding: 10px 12px;
				background: linear-gradient(145deg, #5c75e8, #e84c6c);
				color: white;
				border: none;
				border-radius: 6px;
				cursor: pointer;
				font-weight: bold;
				transition: all 0.2s ease;
				box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
				text-transform: uppercase;
				letter-spacing: 0.5px;
				font-size: 11px;
			}
			.controls button:hover {
				background: linear-gradient(145deg, #6a82fb, #fc5c7d);
				transform: translateY(-1px);
			}
			.controls button:active {
				transform: translateY(1px);
			}
			.controls button:disabled {
				background: #444 !important;
				color: #777;
				cursor: not-allowed;
				opacity: 0.6;
				box-shadow: none;
				transform: none;
			}
			.controls button.active-playing {
				background: #28a745;
				box-shadow: 0 0 8px rgba(40, 167, 69, 0.5);
			}
			.controls select {
				flex: 1;
				min-width: 80px;
				padding: 8px 12px;
				background: rgba(255, 255, 255, 0.95);
				color: #333;
				border: none;
				border-radius: 6px;
				font-weight: bold;
				cursor: pointer;
				font-family: inherit;
				font-size: 12px;
			}
			.controls select:disabled {
				background: #555;
				color: #888;
				cursor: not-allowed;
				opacity: 0.7;
			}
			.status {
				margin-top: 5px;
				font-size: 13px;
				color: #aaa;
				text-align: center;
				word-break: break-all;
				line-height: 1.4;
			}
		</style>
	</head>

	<body>
		<div class="controls">
			<div>
				<label>VRM Model:</label>
				<select id="vrmSelect" disabled>
					<option value="">Loading models...</option>
				</select>
			</div>
			<div>
				<label>VRMA Anim:</label>
				<select id="vrmaSelect" disabled>
					<option value="">Loading animations...</option>
				</select>
			</div>
			<div>
				<label>BVH Anim:</label>
				<select id="bvhSelect" disabled>
					<option value="">Loading animations...</option>
				</select>
			</div>
			<div>
				<button id="playBtn" disabled>Play</button>
				<button id="pauseBtn" disabled>Pause</button>
				<button id="stopBtn" disabled>Stop</button>
			</div>
			<div class="status" id="status">VRMモデルを読み込み中...</div>
		</div>

		<script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
					"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/",
					"@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",
					"@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.min.js"
				}
			}
		</script>

		<script type="module">
			import * as THREE from 'three';
			import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
			import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
			import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from '@pixiv/three-vrm-animation';
			import { BVHLoader } from 'three/addons/loaders/BVHLoader.js';

			// DOM elements
			const vrmSelect = document.getElementById('vrmSelect');
			const vrmaSelect = document.getElementById('vrmaSelect');
			const bvhSelect = document.getElementById('bvhSelect');
			const playBtn = document.getElementById('playBtn');
			const pauseBtn = document.getElementById('pauseBtn');
			const stopBtn = document.getElementById('stopBtn');
			const statusDiv = document.getElementById('status');

			// --- Three.js Setup ---
			const renderer = new THREE.WebGLRenderer({ antialias: true });
			renderer.setSize( window.innerWidth, window.innerHeight );
			renderer.setPixelRatio( window.devicePixelRatio );
			renderer.outputColorSpace = THREE.SRGBColorSpace; // Corrected modern color space setting
			document.body.appendChild( renderer.domElement );

			const camera = new THREE.PerspectiveCamera( 30.0, window.innerWidth / window.innerHeight, 0.1, 20.0 );
			camera.position.set( 0.0, 1.0, 5.0 );

			const controls = new OrbitControls( camera, renderer.domElement );
			controls.screenSpacePanning = true;
			controls.target.set( 0.0, 1.0, 0.0 );
			controls.update();

			const scene = new THREE.Scene();
			scene.background = new THREE.Color(0x222222);

			const light = new THREE.DirectionalLight( 0xffffff, 3.0 );
			light.position.set( 1.0, 1.0, 1.0 ).normalize();
			scene.add( light );

			const ambientLight = new THREE.AmbientLight( 0xffffff, 1.0 );
			scene.add( ambientLight );

			// --- Application State ---
			const AppState = {
				currentVrm: undefined,
				currentMixer: undefined,
				currentAction: undefined,
				vrmaAnimationClip: undefined,
				vrmLoadToken: 0,
				animationLoadToken: 0
			};

			// --- GLTF Loader with VRM and VRMA Plugins ---
			const loader = new GLTFLoader();
			loader.crossOrigin = 'anonymous';
			loader.register( ( parser ) => new VRMLoaderPlugin( parser ) );
			loader.register( ( parser ) => new VRMAnimationLoaderPlugin( parser ) );

			const bvhLoader = new BVHLoader();

			// --- File Paths & Data Discovery ---
			const VRM_DIR = './VRM/';
			const VRM_MANIFEST_URL = './VRM/models.json';
			const VRMA_DIR = './VRMA/';
			const VRMA_MANIFEST_URL = './VRMA/manifest.json';
			const BVH_DIR = './bvh.animation/';
			const BVH_MANIFEST_URL = './bvh.animation/manifest.json';

			async function discoverAssets(directory, manifestUrl, extension) {
				try {
					const response = await fetch(directory);
					if (response.ok) {
						const html = await response.text();
						const regex = new RegExp(`href="([^"]+\\.${extension})"` , 'gi');
						const matches = [...html.matchAll(regex)];
						const items = matches
							.map(m => decodeURIComponent(m[1].split('/').pop()))
							.filter(Boolean);
						const unique = [...new Set(items)].sort((a, b) => a.localeCompare(b));
						if (unique.length > 0) return unique;
					}
				} catch (e) {
					console.warn(`${extension.toUpperCase()} directory scan failed, falling back to manifest:`, e);
				}

				try {
					const response = await fetch(manifestUrl);
					if (response.ok) {
						const data = await response.json();
						const list = data.models || data.animations;
						if (Array.isArray(list) && list.length > 0) return list;
					}
				} catch (e) {
					console.error(`${extension.toUpperCase()} manifest load failed:`, e);
				}
				return [];
			}

			function populateSelect(element, files, directory) {
				element.innerHTML = '';
				if (files.length === 0) {
					element.appendChild(new Option(`No items found`, ''));
					element.disabled = true;
					return;
				}
				
				// Standard placeholder option to avoid auto-triggering on clear
				element.appendChild(new Option('-- Select --', ''));
				
				files.forEach(file => {
					const label = file.replace(new RegExp(`\\.(vrm|vrma|bvh)$`, 'i'), '');
					element.appendChild(new Option(label, directory + encodeURIComponent(file)));
				});
				element.disabled = false;
			}

			// --- Memory Cleanup Utilities ---
			function disposeMaterial(material) {
				if (!material) return;
				material.dispose();
				for (const key in material) {
					if (material[key] && material[key].isTexture) {
						material[key].dispose();
					}
				}
			}

			function purgeCurrentVRM() {
				if (AppState.currentAction) {
					AppState.currentAction.stop();
					AppState.currentAction = undefined;
				}
				if (AppState.currentMixer && AppState.currentVrm) {
					AppState.currentMixer.uncacheRoot(AppState.currentVrm.scene);
				}
				if (AppState.currentVrm) {
					scene.remove(AppState.currentVrm.scene);
					AppState.currentVrm.scene.traverse((obj) => {
						if (obj.isMesh) {
							obj.geometry.dispose();
							if (Array.isArray(obj.material)) {
								obj.material.forEach(m => disposeMaterial(m));
							} else {
								disposeMaterial(obj.material);
							}
						}
					});
					AppState.currentVrm = undefined;
				}
				AppState.currentMixer = undefined;
				AppState.vrmaAnimationClip = undefined;
			}

			// --- Core Loading Mechanics ---
			async function loadVRM(url) {
				const localToken = ++AppState.vrmLoadToken;
				purgeCurrentVRM();
				updateButtons();
				
				statusDiv.textContent = 'VRMモデルを読み込み中...';
				
				return new Promise((resolve, reject) => {
					loader.load(
						url,
						(gltf) => {
							// Race condition check: drop if token changed mid-flight
							if (localToken !== AppState.vrmLoadToken) {
								gltf.scene.traverse((obj) => {
									if (obj.isMesh) {
										obj.geometry.dispose();
										if (Array.isArray(obj.material)) obj.material.forEach(m => disposeMaterial(m));
										else disposeMaterial(obj.material);
									}
								});
								return reject(new Error('VRM configuration outdated by newer selection.'));
							}

							const vrm = gltf.userData.vrm;

							VRMUtils.removeUnnecessaryVertices( gltf.scene );
							VRMUtils.combineSkeletons( gltf.scene );
							VRMUtils.combineMorphs( vrm );

							vrm.scene.traverse( ( obj ) => {
								obj.frustumCulled = false;
							} );

							scene.add( vrm.scene );
							VRMUtils.rotateVRM0( vrm );
							
							AppState.currentVrm = vrm;
							AppState.currentMixer = new THREE.AnimationMixer( vrm.scene );
							
							// Auto-adjust camera target dynamically based on character chest position
							const chestNode = vrm.humanoid.getNormalizedBoneNode('chest');
							if (chestNode) {
								const targetWorldPos = new THREE.Vector3();
								chestNode.getWorldPosition(targetWorldPos);
								controls.target.copy(targetWorldPos);
							} else {
								controls.target.set(0.0, 1.0, 0.0);
							}
							controls.update();

							statusDiv.textContent = 'VRMモデルの読み込みが完了しました！';
							updateButtons();
							resolve(vrm);
						},
						(progress) => {
							if (localToken === AppState.vrmLoadToken) {
								const percent = (100.0 * ( progress.loaded / progress.total )).toFixed(1);
								statusDiv.textContent = `VRMモデルを読み込み中... ${percent}%`;
							}
						},
						(error) => {
							if (localToken === AppState.vrmLoadToken) {
								console.error('Error loading VRM:', error);
								statusDiv.textContent = 'VRMモデルの読み込み中にエラーが発生しました';
								reject(error);
							}
						}
					);
				});
			}

			async function loadVRMA(url, localToken) {
				return new Promise((resolve, reject) => {
					loader.load(
						url,
						(gltf) => {
							if (localToken !== AppState.animationLoadToken) return reject(new Error('Stale animation cancellation.'));
							
							const vrmAnimationData = gltf.userData.vrmAnimations && gltf.userData.vrmAnimations[0];
							if (vrmAnimationData && AppState.currentVrm) {
								const clip = createVRMAnimationClip(vrmAnimationData, AppState.currentVrm);
								if (clip) {
									AppState.vrmaAnimationClip = clip;
									statusDiv.textContent = 'VRMAアニメーションの読み込みが完了しました！';
									resolve(clip);
								} else {
									throw new Error('AnimationClip structural compilation failure.');
								}
							} else {
								throw new Error('Valid VRMA track sequence missing.');
							}
						},
						(progress) => {
							if (localToken === AppState.animationLoadToken) {
								const percent = (100.0 * ( progress.loaded / progress.total )).toFixed(1);
								statusDiv.textContent = `VRMAアニメーションを読み込み中... ${percent}%`;
							}
						},
						(error) => {
							if (localToken === AppState.animationLoadToken) reject(error);
						}
					);
				});
			}

			async function loadBVHAnimation(url, localToken) {
				const result = await bvhLoader.loadAsync(url);
				if (localToken !== AppState.animationLoadToken) throw new Error('Stale animation cancellation.');

				const bvhClip = result.clip;
				if (!bvhClip || bvhClip.tracks.length === 0) {
					throw new Error('Empty or invalid BVH motion payload.');
				}

				const boneNameToNode = {};
				for (const track of bvhClip.tracks) {
					const boneName = track.name.split('.')[0];
					if (boneNameToNode[boneName] !== undefined) continue;
					const node = AppState.currentVrm.humanoid.getNormalizedBoneNode(boneName);
					boneNameToNode[boneName] = node || null;
				}

				const tracks = [];
				for (const track of bvhClip.tracks) {
					const splitName = track.name.split('.');
					const boneName = splitName[0];
					const propName = splitName[1];

					const node = boneNameToNode[boneName];
					if (!node) continue;

					const nodePath = `${node.name}.${propName}`;

					if (boneName === 'hips' && propName === 'position') {
						const values = Float32Array.from(track.values);
						const scaleFactor = 0.01; // cm to m
						for (let i = 0; i < values.length; i++) values[i] *= scaleFactor;

						const vrmHipsNode = AppState.currentVrm.humanoid.getNormalizedBoneNode('hips');
						if (vrmHipsNode) {
							const vrmPos = vrmHipsNode.position;
							const offsetX = vrmPos.x - values[0];
							const offsetY = vrmPos.y - values[1];
							const offsetZ = vrmPos.z - values[2];
							for (let i = 0; i < values.length; i += 3) {
								values[i]     += offsetX;
								values[i + 1] += offsetY;
								values[i + 2] += offsetZ;
							}
						}
						tracks.push(new THREE.VectorKeyframeTrack(nodePath, track.times, values));
					} else {
						const TrackClass = track instanceof THREE.QuaternionKeyframeTrack
							? THREE.QuaternionKeyframeTrack
							: THREE.VectorKeyframeTrack;
						tracks.push(new TrackClass(nodePath, track.times, Float32Array.from(track.values)));
					}
				}

				const clip = new THREE.AnimationClip(bvhClip.name || 'bvhAnimation', bvhClip.duration, tracks);
				AppState.vrmaAnimationClip = clip;
				statusDiv.textContent = 'BVHアニメーションの読み込みが完了しました！';
				return clip;
			}

			// --- Unified Animation Pipeline Handler ---
			async function changeAnimationPipeline(url, type) {
				if (!AppState.currentVrm || !url) return;

				const localToken = ++AppState.animationLoadToken;

				if (AppState.currentAction) {
					AppState.currentAction.stop();
					AppState.currentAction = undefined;
				}
				AppState.vrmaAnimationClip = undefined;
				playBtn.classList.remove('active-playing');
				updateButtons();

				try {
					if (type === 'VRMA') {
						bvhSelect.value = ''; // Reset sibling dropdown
						await loadVRMA(url, localToken);
					} else if (type === 'BVH') {
						vrmaSelect.value = ''; // Reset sibling dropdown
						await loadBVHAnimation(url, localToken);
					}

					if (localToken === AppState.animationLoadToken && AppState.vrmaAnimationClip) {
						updateButtons();
						playAnimation();
					}
				} catch (error) {
					if (localToken === AppState.animationLoadToken) {
						console.error(`Error loading ${type} animation:`, error);
						statusDiv.textContent = `アニメーションの読み込み中にエラーが発生しました: ${error.message}`;
						updateButtons();
					}
				}
			}

			// --- Control Functions ---
			function playAnimation() {
				if (AppState.currentVrm && AppState.vrmaAnimationClip && AppState.currentMixer) {
					if (AppState.currentAction) {
						AppState.currentAction.stop();
					}
					
					try {
						AppState.currentAction = AppState.currentMixer.clipAction(AppState.vrmaAnimationClip);
						AppState.currentAction.setLoop(THREE.LoopRepeat);
						AppState.currentAction.clampWhenFinished = true;
						AppState.currentAction.reset();
						AppState.currentAction.play();
						
						playBtn.classList.add('active-playing');
						statusDiv.textContent = `再生中 (${AppState.vrmaAnimationClip.duration.toFixed(2)}s)`;
					} catch (error) {
						console.error('Error playing animation:', error);
						statusDiv.textContent = '再生エラー: ' + error.message;
					}
				}
			}

			function pauseAnimation() {
				if (AppState.currentAction) {
					AppState.currentAction.paused = !AppState.currentAction.paused;
					if(AppState.currentAction.paused) {
						playBtn.classList.remove('active-playing');
						statusDiv.textContent = '一時停止中';
					} else {
						playBtn.classList.add('active-playing');
						statusDiv.textContent = '再生中...';
					}
				}
			}

			function stopAnimation() {
				if (AppState.currentAction) {
					AppState.currentAction.stop();
					AppState.currentAction = undefined;
					AppState.currentMixer.stopAllAction();
					playBtn.classList.remove('active-playing');

					if (AppState.currentVrm) {
						AppState.currentVrm.humanoid.resetPose();
					}
					statusDiv.textContent = '停止しました';
				}
			}

			function updateButtons() {
				const hasVrm = AppState.currentVrm !== undefined;
				const hasAnimation = AppState.vrmaAnimationClip !== undefined;

				vrmaSelect.disabled = !hasVrm;
				bvhSelect.disabled = !hasVrm;

				playBtn.disabled = !(hasVrm && hasAnimation);
				pauseBtn.disabled = !(hasVrm && hasAnimation);
				stopBtn.disabled = !(hasVrm && hasAnimation);
			}

			// --- UI Event Configuration ---
			playBtn.addEventListener('click', playAnimation);
			pauseBtn.addEventListener('click', pauseAnimation);
			stopBtn.addEventListener('click', stopAnimation);

			vrmSelect.addEventListener('change', async () => {
				const url = vrmSelect.value;
				if (!url) return;
				
				vrmaSelect.value = '';
				bvhSelect.value = '';
				playBtn.classList.remove('active-playing');
				
				try {
					await loadVRM(url);
				} catch (e) {
					console.warn(e.message);
				}
			});

			vrmaSelect.addEventListener('change', () => changeAnimationPipeline(vrmaSelect.value, 'VRMA'));
			bvhSelect.addEventListener('change', () => changeAnimationPipeline(bvhSelect.value, 'BVH'));

			window.addEventListener('resize', () => {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize(window.innerWidth, window.innerHeight);
			});

			// --- Helpers ---
			scene.add( new THREE.GridHelper( 10, 10 ) );
			scene.add( new THREE.AxesHelper( 5 ) );

			// --- Animation Loop ---
			const clock = new THREE.Clock();

			function animate() {
				requestAnimationFrame( animate );
				const deltaTime = clock.getDelta();

				if ( AppState.currentVrm ) {
					// Safeguard explicit component frame evaluations required by modern three-vrm
					if (AppState.currentVrm.lookAt) AppState.currentVrm.lookAt.update(deltaTime);
					if (AppState.currentVrm.expressionManager) AppState.currentVrm.expressionManager.update(deltaTime);
					
					AppState.currentVrm.update(deltaTime);
				}
				if ( AppState.currentMixer ) {
					AppState.currentMixer.update( deltaTime );
				}

				controls.update();
				renderer.render( scene, camera );
			}

			animate();

			// --- Bootstrap Initialization ---
			window.addEventListener('DOMContentLoaded', async () => {
				const [models, vrmaAnimations, bvhAnimations] = await Promise.all([
					discoverAssets(VRM_DIR, VRM_MANIFEST_URL, 'vrm'),
					discoverAssets(VRMA_DIR, VRMA_MANIFEST_URL, 'vrma'),
					discoverAssets(BVH_DIR, BVH_MANIFEST_URL, 'bvh'),
				]);

				populateSelect(vrmSelect, models, VRM_DIR);
				populateSelect(vrmaSelect, vrmaAnimations, VRMA_DIR);
				populateSelect(bvhSelect, bvhAnimations, BVH_DIR);

				// Preload the first available model if present
				if (models.length > 0) {
					const firstVrmUrl = VRM_DIR + encodeURIComponent(models[0]);
					vrmSelect.value = firstVrmUrl;
					try {
						await loadVRM(firstVrmUrl);
					} catch(e) {
						console.warn(e.message);
					}
				} else {
					statusDiv.textContent = '利用可能なVRMモデルが見つかりませんでした。';
				}
			});
		</script>
	</body>
</html>
